<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申し込み完了 | マーケティングデータ基盤パッケージ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --card: #FFFFFF;
  --primary: #0F6E56;
  --primary-light: #E1F5EE;
  --primary-mid: #9FE1CB;
  --cta: #D85A30;
  --cta-hover: #C04E28;
  --text: #1A1A18;
  --text-secondary: #6B6B66;
  --text-tertiary: #9C9A92;
  --border: #E8E6E0;
  --font-jp: 'Noto Sans JP', sans-serif;
  --font-num: 'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-jp);
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* NAV */
.nav {
  background: rgba(250,250,248,0.92);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1080px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-weight: 700; font-size: 14px; color: var(--primary);
  letter-spacing: 0.02em; text-decoration: none;
}

/* MAIN */
.main {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 60px 24px;
}
.thanks-card {
  max-width: 520px; width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 56px 48px;
  text-align: center;
}

/* ICON */
.thanks-icon {
  width: 72px; height: 72px;
  background: var(--primary-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  font-size: 32px;
}

.thanks-label {
  font-size: 12px; font-weight: 500; color: var(--primary);
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px;
}
.thanks-title {
  font-size: clamp(22px, 4vw, 26px); font-weight: 700;
  line-height: 1.5; margin-bottom: 16px;
}
.thanks-desc {
  font-size: 14px; color: var(--text-secondary);
  line-height: 1.9; margin-bottom: 32px;
}

/* TIMELINE */
.timeline {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  text-align: left;
  margin-bottom: 32px;
}
.timeline-title {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 16px;
}
.timeline-list { list-style: none; }
.timeline-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-dot {
  width: 8px; height: 8px;
  background: var(--primary-mid);
  border-radius: 50%; flex-shrink: 0;
  margin-top: 7px;
}
.timeline-text {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}
.timeline-text strong { color: var(--text); font-weight: 500; }

/* BACK BUTTON */
.btn-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 28px; border-radius: 10px;
  background: transparent; color: var(--text);
  font-size: 14px; font-weight: 500; text-decoration: none;
  border: 1px solid var(--border); transition: border-color 0.2s;
}
.btn-back:hover { border-color: var(--text-tertiary); }

/* FOOTER */
.footer {
  text-align: center; padding: 24px;
  font-size: 12px; color: var(--text-tertiary);
  border-top: 1px solid var(--border);
}
.footer-links {
  display: flex; justify-content: center; gap: 20px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.footer-links a {
  color: var(--text-tertiary); text-decoration: none;
}
.footer-links a:hover { color: var(--text); }

@media (max-width: 540px) {
  .thanks-card { padding: 36px 24px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="homepage.html" class="nav-logo">マーケティングデータ基盤</a>
  </div>
</nav>

<main class="main">
  <div class="thanks-card">

    <div class="thanks-icon">✓</div>

    <div class="thanks-label">Complete</div>
    <h1 class="thanks-title">お申し込みを<br>受け付けました</h1>
    <p class="thanks-desc">ご入力いただいたメールアドレス宛に確認メールをお送りしました。<br>内容をご確認のうえ、お待ちください。</p>

    <div class="timeline">
      <div class="timeline-title">今後の流れ</div>
      <ul class="timeline-list">
        <li class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-text"><strong>2営業日以内</strong>にメールにてご連絡します</div>
        </li>
        <li class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-text">日程調整後、<strong>30分のオンラインヒアリング</strong>を実施します</div>
        </li>
        <li class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-text">ヒアリング後、<strong>最適なプランと見積もり</strong>をご提案します</div>
        </li>
      </ul>
    </div>

    <a href="homepage.html" class="btn-back">← サービスページに戻る</a>

  </div>
</main>

<footer class="footer">
  <div class="footer-links">
    <a href="#">プライバシーポリシー</a>
    <a href="#">特定商取引法に基づく表記</a>
    <a href="mailto:your@email.com">お問い合わせ</a>
  </div>
  <div class="footer-copy">&copy; 2026 All Rights Reserved.</div>
</footer>

</body>
</html>
